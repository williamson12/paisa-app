<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon: rupee symbol inline SVG for instant load -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23C8FA64'/><text y='.85em' font-size='70' x='14' fill='%23000'>₹</text></svg>" />

    <!-- Viewport: mobile-first, no zoom, safe area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Paisa" />

    <!-- SEO -->
    <title>Paisa — Premium Finance Tracker for India</title>
    <meta name="description" content="Paisa — India's premium personal finance tracker. Track expenses, set budgets, and get AI-powered CA advice. Built for India." />
    <meta name="keywords" content="expense tracker, personal finance, India, budget, SIP, CA advisor, UPI, paisa" />
    <meta name="author" content="Paisa" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Paisa — Premium Finance Tracker" />
    <meta property="og:description" content="Track every rupee. Get AI-powered CA advice. Built for India." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Fonts: preconnect first for performance, then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800;12..96,900&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Anti-FOUC: render black background before React boots -->
    <style>
      html, body { background: #000000; margin: 0; padding: 0; min-height: 100vh; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
